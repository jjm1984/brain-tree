<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#04070E">
<title>The Brain Tree</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --field:#04070E; --ink:#D8DEEA; --amber:#F0A840; --amber-core:#FFD98A;
    --gold:#E8C15A; --blue:#6FB8FF; --silver:#C9D4E8; --violet:#8B6FD9;
    --panel:rgba(9,13,24,0.94);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--field);color:var(--ink);
    font-family:'JetBrains Mono',ui-monospace,monospace;-webkit-font-smoothing:antialiased}
  #stage{position:fixed;inset:0;touch-action:none;display:block}
  #vignette{position:fixed;inset:0;pointer-events:none;z-index:2;
    background:radial-gradient(ellipse at 50% 42%, transparent 52%, rgba(0,0,3,.6) 100%)}
  header{position:fixed;top:0;left:0;right:0;padding:18px 22px 0;pointer-events:none;z-index:5}
  h1{font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-style:italic;
    font-size:clamp(22px,4.5vw,32px);color:#EDE6D4;opacity:.93;letter-spacing:.02em}
  .trunkline{font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;
    font-size:clamp(12px,2.5vw,16px);color:var(--amber-core);opacity:.72;margin-top:2px}
  #source{margin-top:6px;font-size:9px;letter-spacing:.14em;opacity:.4;text-transform:lowercase}
  #source.live::before{content:'◉ ';color:#9AE85F}
  #source.stale::before{content:'⚠ ';color:var(--gold)}
  #filters{position:fixed;top:76px;left:0;right:0;z-index:5;display:flex;gap:6px;
    flex-wrap:wrap;padding:6px 22px 10px;pointer-events:none}
  .chip{flex:0 0 auto;font:inherit;font-size:10px;letter-spacing:.09em;color:var(--ink);
    touch-action:manipulation;pointer-events:auto;
    background:rgba(201,212,232,.06);border:1px solid rgba(201,212,232,.15);
    border-radius:20px;padding:5px 12px;cursor:pointer;text-transform:lowercase;
    transition:all .15s;user-select:none;-webkit-tap-highlight-color:transparent}
  .chip.on{background:rgba(232,193,90,.14);border-color:var(--gold);color:var(--amber-core)}
  .chip.gaps.on{background:rgba(111,184,255,.15);border-color:var(--blue);color:#AFD5FF}
  #hint{position:fixed;right:20px;top:20px;font-size:9px;letter-spacing:.1em;opacity:.38;
    z-index:5;text-transform:lowercase;text-align:right;line-height:1.8;pointer-events:none}
  #reset{position:fixed;right:16px;bottom:calc(100px + env(safe-area-inset-bottom));z-index:6;
    font:inherit;font-size:10px;letter-spacing:.1em;color:var(--ink);cursor:pointer;
    background:rgba(201,212,232,.08);border:1px solid rgba(201,212,232,.2);
    border-radius:18px;padding:8px 14px;text-transform:lowercase;display:none;
    -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
  #legend{position:fixed;left:0;right:0;bottom:0;z-index:4;display:flex;gap:12px;
    flex-wrap:wrap;align-items:center;padding:12px 22px calc(14px + env(safe-area-inset-bottom));
    font-size:9px;letter-spacing:.08em;text-transform:lowercase;pointer-events:none;
    background:linear-gradient(transparent, rgba(4,7,14,.9))}
  .key{display:flex;align-items:center;gap:5px;opacity:.68}
  .dot{width:7px;height:7px;border-radius:50%;box-shadow:0 0 10px currentColor}
  #sheet{position:fixed;left:0;right:0;bottom:0;z-index:7;background:var(--panel);
    -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
    border-top:1px solid rgba(201,212,232,.14);border-radius:14px 14px 0 0;
    padding:16px 22px calc(22px + env(safe-area-inset-bottom));
    transform:translateY(105%);transition:transform .28s ease;max-height:48vh;overflow-y:auto}
  #sheet.open{transform:translateY(0)}
  #sheet .layer{font-size:9px;letter-spacing:.16em;text-transform:uppercase;opacity:.55}
  #sheet h2{font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;
    font-size:22px;color:#F2ECDC;margin:4px 0 8px;line-height:1.2}
  #sheet .meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .pill{font-size:9px;letter-spacing:.1em;padding:3px 9px;border-radius:12px;
    border:1px solid rgba(201,212,232,.2);text-transform:lowercase}
  #sheet .note{font-size:12px;line-height:1.65;opacity:.85}
  #sheet .path{font-size:9px;letter-spacing:.08em;opacity:.4;margin-top:8px;word-break:break-all}
  #sheet .links{margin-top:12px;display:flex;gap:6px;flex-wrap:wrap}
  .linkchip{font:inherit;font-size:10px;color:var(--silver);cursor:pointer;text-align:left;
    background:rgba(201,212,232,.05);border:1px solid rgba(201,212,232,.18);
    border-radius:12px;padding:4px 10px;-webkit-tap-highlight-color:transparent}
  .linkchip.supports{color:#EFD9A0;border-color:rgba(232,193,90,.4)}
  .linkchip.challenges{color:#FFB080;border-color:rgba(240,168,64,.4)}
  .linkchip.tendril{color:#AFD5FF;border-color:rgba(111,184,255,.4)}
  #close{position:absolute;top:10px;right:14px;background:none;border:none;
    color:var(--ink);opacity:.5;font-size:18px;cursor:pointer;font-family:inherit;padding:4px 8px}
  #load{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    z-index:9;background:var(--field);color:var(--amber-core);font-style:italic;
    font-family:'Cormorant Garamond',Georgia,serif;font-size:14px;opacity:1;
    transition:opacity .8s ease;pointer-events:none;letter-spacing:.03em}
  #load.gone{opacity:0}
  .blabel{position:fixed;top:0;left:0;font:500 10px/1.15 'JetBrains Mono',ui-monospace,monospace;
    letter-spacing:.03em;padding:3px 8px;border-radius:8px;pointer-events:none;
    text-transform:lowercase;white-space:nowrap;z-index:3;will-change:transform;
    transition:opacity .3s;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);
    color:#FFE6A8;background:rgba(9,13,24,.72);border:1px solid rgba(255,217,138,.22)}
  .blabel.branch{color:#FFE6A8;border-color:rgba(255,217,138,.35);font-weight:500}
  .blabel.gap{color:#AFD5FF;border-color:rgba(111,184,255,.35);font-style:italic}
  .blabel.tendril{color:#AFD5FF;border-color:rgba(111,184,255,.3);font-style:italic;opacity:.85}
  .blabel.trunk{color:#FFD98A;border-color:rgba(240,184,80,.5);
    font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;font-size:12px;
    text-transform:none;letter-spacing:.02em}
  #err{position:fixed;left:22px;right:22px;top:50%;transform:translateY(-50%);z-index:10;
    padding:16px 20px;background:rgba(20,10,10,.94);border:1px solid rgba(240,168,64,.4);
    border-radius:10px;color:#FFB080;font-size:12px;line-height:1.5;display:none}
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div id="vignette"></div>
<header>
  <h1>The Brain Tree</h1>
  <div class="trunkline">do what is fulfilling — cause no harm</div>
  <div id="source"></div>
</header>
<div id="filters"></div>
<div id="hint">drag · orbit<br>pinch / scroll · zoom<br>tap · explore</div>
<button id="reset">↺ whole tree</button>
<div id="sheet">
  <button id="close" aria-label="Close">×</button>
  <div class="layer" id="sLayer"></div>
  <h2 id="sTitle"></h2>
  <div class="meta" id="sMeta"></div>
  <div class="note" id="sNote"></div>
  <div class="path" id="sPath"></div>
  <div class="links" id="sLinks"></div>
</div>
<div id="legend">
  <span class="key"><span class="dot" style="color:#E8C15A;background:#E8C15A"></span>settled</span>
  <span class="key"><span class="dot" style="color:#FFF4D6;background:#FFF4D6"></span>forming</span>
  <span class="key"><span class="dot" style="color:#6FB8FF;background:transparent;border:1px solid #6FB8FF;box-shadow:none"></span>named gap</span>
  <span class="key"><span class="dot" style="color:#AFD5FF;background:#AFD5FF"></span>further reading</span>
  <span class="key"><span class="dot" style="color:#BFE0FF;background:#BFE0FF"></span>philosophy roots</span>
  <span class="key"><span class="dot" style="color:#8B6FD9;background:#8B6FD9;opacity:.5"></span>mycelium</span>
</div>
<div id="load">the tree is growing…</div>
<div id="err"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
let THREE, OrbitControls, EffectComposer, RenderPass, UnrealBloomPass, OutputPass;
function showError(msg) {
  const el = document.getElementById('err');
  el.innerHTML = msg; el.style.display = 'block';
  document.getElementById('load').classList.add('gone');
}
try {
  THREE = await import('three');
  ({ OrbitControls } = await import('three/addons/controls/OrbitControls.js'));
  ({ EffectComposer } = await import('three/addons/postprocessing/EffectComposer.js'));
  ({ RenderPass } = await import('three/addons/postprocessing/RenderPass.js'));
  ({ UnrealBloomPass } = await import('three/addons/postprocessing/UnrealBloomPass.js'));
  ({ OutputPass } = await import('three/addons/postprocessing/OutputPass.js'));
} catch (err) {
  showError(`<b>Three.js failed to load.</b><br><small>${err.message}</small>`);
  throw err;
}

try {

// ===================== DATA =====================
const SAMPLE_FALLBACK = {
  nodes: [
    { id:'r-aristotle', title:'Aristotle — hexis / ethismos', layer:'roots', type:'philosophy', state:{philosophy:'grounded'}, instrument:'philosophy' },
    { id:'r-peirce', title:'Peirce — fallibilism', layer:'roots', type:'philosophy', state:{philosophy:'grounded'}, instrument:'philosophy' },
    { id:'r-popper', title:'Popper — falsification', layer:'roots', type:'philosophy', state:{philosophy:'grounded'}, instrument:'philosophy' },
    { id:'r-nietzsche', title:'Nietzsche — standing counter', layer:'roots', type:'philosophy', state:{philosophy:'forming'}, instrument:'philosophy' },
    { id:'m-brain', title:'Brain', layer:'mycelium', type:'leaf', state:{leaf:'yellow'}, instrument:'science' },
    { id:'m-ns', title:'Nervous system', layer:'mycelium', type:'leaf', state:{leaf:'green'}, instrument:'science' },
    { id:'m-hormones', title:'Hormones', layer:'mycelium', type:'leaf', state:{leaf:'yellow'}, instrument:'science' },
    { id:'b-aliveness', title:'Aliveness', layer:'knowledge', type:'branch', state:{branch:'green'}, instrument:'multi' },
    { id:'b-worth', title:'Self-worth', layer:'knowledge', type:'branch', state:{branch:'green'}, instrument:'multi' },
    { id:'b-epistem', title:'Epistemology', layer:'knowledge', type:'branch', state:{branch:'green'}, instrument:'philosophy' },
    { id:'k-conditions', title:'Six conditions', layer:'knowledge', type:'leaf', state:{leaf:'green'}, instrument:'lived-experience' },
    { id:'k-purposeless', title:'Purposeful purposelessness', layer:'knowledge', type:'leaf', state:{leaf:'green'}, instrument:'philosophy' },
    { id:'k-worthmachine', title:'Worth-machine', layer:'knowledge', type:'leaf', state:{leaf:'yellow'}, instrument:'lived-experience' },
    { id:'k-deferred', title:'Deferred truth', layer:'knowledge', type:'leaf', state:{leaf:'yellow'}, instrument:'philosophy' },
    { id:'k-gap-external', title:'External creativity research', layer:'knowledge', type:'leaf', state:{leaf:'peripheral'}, instrument:null },
    { id:'c-resentment', title:'Resentment is the audit trigger', layer:'code', type:'principle', state:{leaf:'green'}, instrument:'philosophy' },
    { id:'p-fourcond', title:'Four-condition sacrifice audit', layer:'map', type:'principle', state:{leaf:'green'}, instrument:'philosophy' },
    { id:'meta-feedback', title:'Feedback loop', layer:'meta', type:'principle', state:null, instrument:null },
  ],
  edges: [
    { source:'k-conditions', target:'b-aliveness', type:'supports' },
    { source:'k-purposeless', target:'b-aliveness', type:'supports' },
    { source:'k-worthmachine', target:'b-worth', type:'supports' },
    { source:'k-deferred', target:'b-epistem', type:'supports' },
    { source:'b-epistem', target:'r-peirce', type:'supports' },
    { source:'b-epistem', target:'r-popper', type:'supports' },
    { source:'b-aliveness', target:'r-aristotle', type:'supports' },
    { source:'r-nietzsche', target:'r-peirce', type:'challenges' },
    { source:'c-resentment', target:'k-worthmachine', type:'supports' },
    { source:'p-fourcond', target:'c-resentment', type:'supports' },
    { source:'meta-feedback', target:'b-epistem', type:'supports' },
    { source:'m-brain', target:'k-conditions', type:'supports' },
  ],
  meta: { source:'embedded' }
};

async function fetchGraph() {
  const sources = [
    { url:'./graph.json', kind:'local' },
    { url:'https://raw.githubusercontent.com/jjm1984/brain-tree/main/public/graph.json', kind:'github' }
  ];
  for (const { url, kind } of sources) {
    try {
      const r = await fetch(url, { cache: 'no-store' });
      if (r.ok) {
        const j = await r.json();
        if (j && Array.isArray(j.nodes) && j.nodes.length && Array.isArray(j.edges)) {
          return { raw: j, source: kind, built: j.meta?.lastBuilt || null };
        }
      }
    } catch (_) {}
  }
  return { raw: SAMPLE_FALLBACK, source: 'sample', built: null };
}
function normalizeLive(g) {
  const stateMap = { green:'green', yellow:'yellow', peripheral:'peripheral',
    forming:'yellow', grounded:'green', growing:'yellow', dry:'dry' };
  const nodes = g.nodes.map(n => {
    let state = 'green';
    if (n.state && typeof n.state === 'object') {
      const inner = n.state.leaf || n.state.philosophy || n.state.branch;
      state = stateMap[inner] || 'green';
    }
    return { id: n.id, title: n.title || n.id, layer: n.layer, type: n.type,
      state, instrument: n.instrument || null, filePath: n.filePath || null };
  });
  const edges = g.edges.map(e => ({ source: e.source, target: e.target, kind: e.type || 'supports' }));
  return { nodes, edges };
}

const REDUCED = matchMedia('(prefers-reduced-motion: reduce)').matches;
const { raw, source, built } = await fetchGraph();
const data = normalizeLive(raw);
if (!data.nodes.length) { showError('<b>No nodes to render.</b>'); throw new Error('empty'); }

const sourceEl = document.getElementById('source');
if (source === 'local') { sourceEl.className='live'; sourceEl.textContent='live · local graph.json'; }
else if (source === 'github') { sourceEl.className='live'; sourceEl.textContent=`live · github · ${built?built.replace('T',' ').slice(0,19)+'z':'main'}`; }
else { sourceEl.className='stale'; sourceEl.textContent='offline · embedded sample'; }

// aliveness = load-bearing-ness
const degree = {};
data.edges.forEach(e => { degree[e.source]=(degree[e.source]||0)+1; degree[e.target]=(degree[e.target]||0)+1; });
const STATE_W = { green:1.5, yellow:2.2, tension:2.2, peripheral:0.8, dry:0.35 };
const TYPE_W  = { branch:3.5, principle:1.6, inference:1.4, philosophy:1.4, layer:1.5, leaf:1.0 };
function aliveness(n) {
  const d = degree[n.id]||0, sw = STATE_W[n.state]||1.0, tw = TYPE_W[n.type]||1.0;
  return (n.type==='branch' ? (1+d*0.5) : (1+d*0.35)) * sw * tw;
}
// leaf → its branch (via supports edges)
const leafToBranch = {};
data.edges.filter(e=>e.kind==='supports').forEach(e => {
  const tgt = data.nodes.find(n=>n.id===e.target);
  if (tgt && tgt.type==='branch') leafToBranch[e.source] = tgt.id;
});

// ===================== RENDERER =====================
const canvas = document.getElementById('stage');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:false, powerPreference:'high-performance', stencil:false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x04070E);
scene.fog = new THREE.FogExp2(0x04070E, 0.016);

const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 200);
camera.position.set(5, 3.2, 15.5);

const rt = new THREE.WebGLRenderTarget(innerWidth, innerHeight, { type: THREE.HalfFloatType, samples: 4 });
const composer = new EffectComposer(renderer, rt);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.15, 0.8, 0.12);
composer.addPass(bloomPass);
composer.addPass(new OutputPass());

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true; controls.dampingFactor = 0.08;
controls.minDistance = 4; controls.maxDistance = 45;
controls.enablePan = false; controls.zoomSpeed = 1.1;
controls.autoRotate = !REDUCED; controls.autoRotateSpeed = 0.22;
controls.target.set(0, 1.3, 0);
controls.touches = { ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_PAN };
controls.addEventListener('start', () => { controls.autoRotate = false; });

const world = new THREE.Group();
scene.add(world);

// ===================== SKELETON GENERATION =====================
const rng = (s=>()=> (s = s*16807 % 2147483647)/2147483647)(20260716);
const V3 = (x,y,z)=>new THREE.Vector3(x,y,z);

// trunk centerline: gentle organic S-curve
function trunkPoint(y) {
  return V3(0.22*Math.sin(y*0.85), y, 0.14*Math.sin(y*0.6+1.2));
}

// tapered lofted tube along points, vertex-colored c0→c1
function loft(pts, r0, r1, c0, c1, radial=7) {
  const n = pts.length, pos=[], col=[], idx=[];
  for (let i=0;i<n;i++){
    const t=i/(n-1);
    const tan=V3(0,0,0).subVectors(pts[Math.min(n-1,i+1)], pts[Math.max(0,i-1)]).normalize();
    const up=Math.abs(tan.y)>0.9?V3(1,0,0):V3(0,1,0);
    const nrm=V3(0,0,0).crossVectors(tan,up).normalize();
    const bin=V3(0,0,0).crossVectors(tan,nrm).normalize();
    const r=r0+(r1-r0)*t;
    const c=c0.clone().lerp(c1,t);
    for(let j=0;j<radial;j++){
      const a=j/radial*Math.PI*2;
      const p=pts[i].clone().addScaledVector(nrm,Math.cos(a)*r).addScaledVector(bin,Math.sin(a)*r);
      pos.push(p.x,p.y,p.z); col.push(c.r,c.g,c.b);
    }
  }
  for(let i=0;i<n-1;i++)for(let j=0;j<radial;j++){
    const a=i*radial+j, b=i*radial+(j+1)%radial, c2=(i+1)*radial+j, d=(i+1)*radial+(j+1)%radial;
    idx.push(a,c2,b, b,c2,d);
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('color',new THREE.Float32BufferAttribute(col,3));
  g.setIndex(idx);
  return g;
}
const skeletonMats = [];
function addTube(pts, r0, r1, c0, c1, opacity=1) {
  const mat = new THREE.MeshBasicMaterial({ vertexColors:true, transparent:true, opacity });
  skeletonMats.push({ mat, base: opacity });
  world.add(new THREE.Mesh(loft(pts, r0, r1, c0, c1), mat));
}

// organic curved path
function organicPath(origin, dir, len, steps, curl, yBias) {
  const pts=[origin.clone()]; const d=dir.clone().normalize();
  const L=len/steps;
  for(let i=0;i<steps;i++){
    d.x+=(rng()-0.5)*curl; d.z+=(rng()-0.5)*curl; d.y+=yBias; d.normalize();
    pts.push(pts[pts.length-1].clone().addScaledVector(d,L));
  }
  return pts;
}

// twig line accumulator (one big LineSegments for perf)
const twigPos=[], twigCol=[];
function addPolyline(pts, c0, c1) {
  for(let i=0;i<pts.length-1;i++){
    const t0=i/(pts.length-1), t1=(i+1)/(pts.length-1);
    const ca=c0.clone().lerp(c1,t0), cb=c0.clone().lerp(c1,t1);
    twigPos.push(pts[i].x,pts[i].y,pts[i].z, pts[i+1].x,pts[i+1].y,pts[i+1].z);
    twigCol.push(ca.r,ca.g,ca.b, cb.r,cb.g,cb.b);
  }
}

// palette (matched to reference)
const C = {
  trunkLo:  new THREE.Color(0x8A6A3A), trunkHi: new THREE.Color(0xF5E2B0),
  limbBase: new THREE.Color(0xEFDCAE), limbTip: new THREE.Color(0xC8933F),
  twigBase: new THREE.Color(0xD8C89A), twigTip: new THREE.Color(0xB07830),
  rootBase: new THREE.Color(0xD8E6F5), rootTip: new THREE.Color(0x6FA0C8),
  rootFine: new THREE.Color(0x9FC0DC), rootFade: new THREE.Color(0x1A2838),
  mycA:     new THREE.Color(0x5A4A98), mycB:    new THREE.Color(0x0A0D1A)
};

// recursive canopy limb: tubes for depth<2, lines beyond; collect twig anchors
function growLimb(origin, dir, len, r, depth, maxDepth, anchors) {
  const pts = organicPath(origin, dir, len, 5, 0.42+depth*0.1, 0.10+depth*0.05);
  if (depth < 2) {
    addTube(pts, r, r*0.55, C.limbBase.clone().lerp(C.limbTip,depth*0.3), C.limbTip, 0.95);
  } else {
    addPolyline(pts, C.twigBase, C.twigTip);
  }
  const end = pts[pts.length-1];
  if (depth >= maxDepth) { anchors.push(end); return; }
  const nCh = depth===0 ? 3 : (2 + (rng()>0.5?1:0));
  for (let i=0;i<nCh;i++){
    const k = 1 + Math.floor(rng()*(pts.length-2));
    const base = pts[k];
    const d = V3(0,0,0).subVectors(pts[Math.min(pts.length-1,k+1)], pts[k-1]).normalize();
    d.x += (rng()-0.5)*1.1; d.z += (rng()-0.5)*1.1; d.y += 0.35+rng()*0.4;
    d.normalize();
    growLimb(base, d, len*(0.55+rng()*0.15), r*0.5, depth+1, maxDepth, anchors);
  }
  // continue tip
  const dTip = V3(0,0,0).subVectors(end, pts[pts.length-2]).normalize();
  dTip.x+=(rng()-0.5)*0.6; dTip.y+=0.3; dTip.z+=(rng()-0.5)*0.6; dTip.normalize();
  growLimb(end, dTip, len*0.6, r*0.5, depth+1, maxDepth, anchors);
}

// recursive root: downward-out, flattening; collect root anchors
function growRoot(origin, dir, len, r, depth, maxDepth, anchors) {
  const pts = organicPath(origin, dir, len, 5, 0.4, -0.16+depth*0.06);
  // flatten as roots deepen
  for (const p of pts) if (p.y < -2.6) p.y = -2.6 - (p.y + 2.6) * 0.35;
  if (depth < 1) addTube(pts, r, r*0.5, C.rootBase, C.rootTip, 0.9);
  else addPolyline(pts, C.rootFine, C.rootFade);
  const end = pts[pts.length-1];
  if (depth >= maxDepth) { anchors.push(end); return; }
  const nCh = 2 + (rng()>0.5?1:0);
  for (let i=0;i<nCh;i++){
    const k = 1 + Math.floor(rng()*(pts.length-2));
    const d = V3(0,0,0).subVectors(pts[Math.min(pts.length-1,k+1)], pts[k-1]).normalize();
    d.x+=(rng()-0.5)*1.2; d.z+=(rng()-0.5)*1.2; d.y-=0.1+rng()*0.25; d.normalize();
    growRoot(pts[k], d, len*(0.6+rng()*0.15), r*0.5, depth+1, maxDepth, anchors);
  }
}

const edgeObjs = [];
function edgeHash(a,b){ const s=a+'|'+b; let h=2166136261;
  for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);} return (h>>>0)/4294967295; }
function addEdge(aid, bid, kind) {
  const A=byId[aid], B=byId[bid]; if(!A||!B) return;
  const cross = A.userData.layer !== B.userData.layer && kind==='supports';
  const h = edgeHash(aid,bid);
  let color, op;
  if (kind==='challenges'){ color=0xF0A840; op=0.85; }
  else if (cross && (A.userData.layer==='roots'||B.userData.layer==='roots')){ color=0x8FC5E8; op=0.5; }
  else if (cross){ color=0xE8C15A; op=0.4; }
  else { color=0xD8C89A; op=0.22; }
  const nv = 12;
  const pos=new Float32Array(nv*3);
  const cpx=Math.cos(h*6.283)*0.4, cpz=Math.sin(h*6.283)*0.4;
  const cpy=(A.position.y+B.position.y)*0.5;
  for(let i=0;i<nv;i++){
    const t=i/(nv-1), u=1-t;
    pos[i*3]  =u*u*A.position.x+2*u*t*(cross?cpx:(A.position.x+B.position.x)/2)+t*t*B.position.x;
    pos[i*3+1]=u*u*A.position.y+2*u*t*cpy+t*t*B.position.y;
    pos[i*3+2]=u*u*A.position.z+2*u*t*(cross?cpz:(A.position.z+B.position.z)/2)+t*t*B.position.z;
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const m=new THREE.LineBasicMaterial({ color, transparent:true, opacity:op });
  const line=new THREE.Line(g,m);
  world.add(line);
  edgeObjs.push({ line, mat:m, a:aid, b:bid, baseOp:op });
}
data.edges.forEach(e => addEdge(e.source, e.target, e.kind));

data.nodes.filter(n=>n.state==='peripheral').forEach((n,i) => {

  const P=src.position;
  const out=V3(P.x,0,P.z); if(out.lengthSq()<0.01) out.set(Math.cos(i),0,Math.sin(i));
  out.normalize();
  const len=1.8+rng()*1.4;
  const E=P.clone().addScaledVector(out,len);
  E.y += P.y>=0 ? (0.5+rng()*1.0) : -(0.4+rng()*0.7);
  const mid=P.clone().lerp(E,0.5).add(V3((rng()-0.5)*0.6,(rng()-0.5)*0.4,(rng()-0.5)*0.6));
  const nv=16, pos=[], col=[];
  const c0=new THREE.Color(0x8FB8E8), c1=new THREE.Color(0x0A0E1A);
  for(let k2=0;k2<nv-1;k2++){
    const t0=k2/(nv-1), t1=(k2+1)/(nv-1);
    const q0=quad(P,mid,E,t0), q1=quad(P,mid,E,t1);
    pos.push(q0.x,q0.y,q0.z,q1.x,q1.y,q1.z);
    const ca=c0.clone().lerp(c1,t0), cb=c0.clone().lerp(c1,t1);
    col.push(ca.r,ca.g,ca.b,cb.r,cb.g,cb.b);
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('color',new THREE.Float32BufferAttribute(col,3));
  const m=new THREE.LineBasicMaterial({ vertexColors:true, transparent:true, opacity:0.6 });
  tendrilMats.push({ mat:m, phase:i, base:0.6 });
  world.add(new THREE.LineSegments(g,m));
  const endId='tendril-'+n.id;
  placeNode({ id:endId, title:'↝ beyond '+n.title, layer:'beyond the tree', type:'tendril',
    state:'peripheral', instrument:'further-reading',
    note:'What lies past this named gap. The tendril is the tree reaching, not what it has grasped.',
    tendrilFrom:n.id }, E);
  link(n.id, endId, 'tendril');
});
function quad(A,M,B,t){ const u=1-t;
  return V3(u*u*A.x+2*u*t*M.x+t*t*B.x, u*u*A.y+2*u*t*M.y+t*t*B.y, u*u*A.z+2*u*t*M.z+t*t*B.z); }

setTimeout(()=>document.getElementById('load').remove(),1400);

function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  if(cameraTween){
    const p=Math.min(1,(performance.now()-cameraTween.t0)/cameraTween.dur);
    const e=p<0.5?2*p*p:1-Math.pow(-2*p+2,2)/2;
    camera.position.lerpVectors(cameraTween.startPos,cameraTween.endPos,e);
    controls.target.lerpVectors(cameraTween.startTarget,cameraTween.endTarget,e);
    camera.lookAt(controls.target);
    if(p>=1)cameraTween=null;
  } else controls.update();

  pickables.forEach((m,i)=>{
    if(!m.visible)return;
    const n=m.userData;
    let s=1;
    if(n.state==='yellow'){
      s=1+0.18*Math.sin(t*1.5+n.drift);
      m.material.color.copy(n.baseColor).multiplyScalar(0.9+0.35*Math.sin(t*1.7+n.drift));
    }
    if(n.layer==='beyond the tree'&&!REDUCED){
      m.rotation.y=t*0.3+n.drift;
      m.position.y+=Math.sin(t*0.4+n.drift)*0.0009;
    }
    const targetOp=focused
      ?(m===focused?1.0:(adj[focused.userData.id]||[]).some(l=>l.id===n.id)?0.92:0.12)
      :n.baseOpacity;
    m.material.opacity+=(targetOp-m.material.opacity)*0.15;
    if(m===focused&&!REDUCED)s*=1.2+0.06*Math.sin(t*2.4);
    m.scale.setScalar(n.baseSize*s);
  });

  skeletonMats.forEach(d=>{
    const target=focused?d.base*0.28:d.base;
    d.mat.opacity+=(target-d.mat.opacity)*0.1;
  });
  edgeObjs.forEach(({mat,a,b,baseOp})=>{
    const target=focused
      ?((adj[focused.userData.id]||[]).some(l=>l.id===a||l.id===b)?baseOp:baseOp*0.12)
      :baseOp;
    mat.opacity+=(target-mat.opacity)*0.1;
  });
  tendrilMats.forEach(o=>{
    const base=focused?o.base*0.3:o.base;
    o.mat.opacity=base+0.15*Math.sin(t*0.7+o.phase);
  });

  labels.forEach((el,id)=>{
    const mesh=byId[id];
    if(!mesh||!mesh.visible){el.style.opacity=0;return;}
    _tv.copy(mesh.position); _tv.project(camera);
    if(_tv.z>1){el.style.opacity=0;return;}
    const x=(_tv.x+1)*0.5*innerWidth, y=(1-_tv.y)*0.5*innerHeight;
    el.style.transform=`translate(${x}px, ${y}px) translate(-50%, calc(-100% - 16px))`;
    el.style.opacity=focused&&focused!==mesh?0.12:(mesh.userData.layer==='beyond the tree'?0.7:0.88);
  });

  composer.render();
}
animate();

} catch (err) {
  showError(`<b>Something broke while growing the tree.</b><br><small>${err.message}</small>`);
  throw err;
}
</script>
</body>
