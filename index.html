<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brain Tree — Living Library</title>
<meta name="description" content="A living library of one mind — structured as a tree, visualised as a graph.">
<style>
  :root {
    --surface-1:      #fcfcfb;
    --surface-2:      #f9f9f7;
    --text-primary:   #0b0b0b;
    --text-secondary: #52514e;
    --text-muted:     #898781;
    --gridline:       #e1e0d9;
    --border:         rgba(11,11,11,0.10);
    --node-stroke:    #fcfcfb;
    --link-stroke:    #c3c2b7;

    --layer-mycelium:       #2a78d6;
    --layer-roots:          #4a3aa7;
    --layer-knowledge:      #1baf7a;
    --layer-code:           #eb6834;
    --layer-map:            #e87ba4;
    --layer-flowers-fruits: #e34948;
    --layer-meta:           #898781;
    --layer-unknown:        #c3c2b7;
  }
  :root[data-theme="dark"] {
    --surface-1:      #1a1a19;
    --surface-2:      #0d0d0d;
    --text-primary:   #ffffff;
    --text-secondary: #c3c2b7;
    --text-muted:     #898781;
    --gridline:       #2c2c2a;
    --border:         rgba(255,255,255,0.10);
    --node-stroke:    #1a1a19;
    --link-stroke:    #383835;

    --layer-mycelium:       #3987e5;
    --layer-roots:          #9085e9;
    --layer-knowledge:      #199e70;
    --layer-code:           #d95926;
    --layer-map:            #d55181;
    --layer-flowers-fruits: #e66767;
    --layer-meta:           #898781;
    --layer-unknown:        #52514e;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --surface-1:      #1a1a19;
      --surface-2:      #0d0d0d;
      --text-primary:   #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted:     #898781;
      --gridline:       #2c2c2a;
      --border:         rgba(255,255,255,0.10);
      --node-stroke:    #1a1a19;
      --link-stroke:    #383835;

      --layer-mycelium:       #3987e5;
      --layer-roots:          #9085e9;
      --layer-knowledge:      #199e70;
      --layer-code:           #d95926;
      --layer-map:            #d55181;
      --layer-flowers-fruits: #e66767;
      --layer-meta:           #898781;
      --layer-unknown:        #52514e;
    }
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--surface-2);
    color: var(--text-primary);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    overflow: hidden;
  }
  #app { display: flex; flex-direction: column; height: 100vh; }

  header {
    display: flex; align-items: center; gap: 16px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface-1);
    flex-wrap: wrap;
  }
  header h1 { font-size: 15px; font-weight: 600; margin: 0; white-space: nowrap; }
  header h1 span { color: var(--text-muted); font-weight: 400; }
  #search {
    flex: 1; min-width: 160px; max-width: 320px;
    padding: 6px 10px; border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text-primary);
    font-size: 13px;
  }
  #legend { display: flex; gap: 10px; flex-wrap: wrap; font-size: 11px; color: var(--text-secondary); }
  #legend .item { display: flex; align-items: center; gap: 4px; cursor: pointer; user-select: none; }
  #legend .item.dim { opacity: 0.35; }
  #legend .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  #meta-info { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

  main { flex: 1; display: flex; min-height: 0; }
  #graph-wrap { flex: 1; position: relative; min-width: 0; }
  svg#graph { width: 100%; height: 100%; display: block; cursor: grab; }
  svg#graph:active { cursor: grabbing; }

  .link { stroke: var(--link-stroke); stroke-opacity: 0.55; }
  .node circle { stroke: var(--node-stroke); stroke-width: 1.5px; cursor: pointer; }
  .node text {
    font-size: 9px; fill: var(--text-secondary); pointer-events: none;
    paint-order: stroke; stroke: var(--surface-2); stroke-width: 3px;
  }
  .node.faded { opacity: 0.12; }
  .link.faded { opacity: 0.05; }

  #tooltip {
    position: absolute; pointer-events: none;
    background: var(--surface-1); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 10px; font-size: 12px;
    max-width: 260px; box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    display: none; z-index: 10;
  }
  #tooltip .t-title { font-weight: 600; margin-bottom: 2px; }
  #tooltip .t-meta { color: var(--text-muted); font-size: 11px; }

  #panel {
    width: 380px; flex-shrink: 0;
    border-left: 1px solid var(--border);
    background: var(--surface-1);
    overflow-y: auto;
    padding: 0;
    display: none;
  }
  #panel.open { display: block; }
  #panel-header {
    position: sticky; top: 0;
    background: var(--surface-1);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 10px;
  }
  #panel-close {
    float: right; cursor: pointer; border: none; background: none;
    color: var(--text-muted); font-size: 18px; line-height: 1; padding: 0 4px;
  }
  #panel-header h2 { font-size: 16px; margin: 0 24px 6px 0; }
  #panel-badges { display: flex; gap: 6px; flex-wrap: wrap; font-size: 11px; }
  #panel-badges span {
    padding: 2px 8px; border-radius: 999px; background: var(--surface-2);
    color: var(--text-secondary); border: 1px solid var(--border);
  }
  #panel-body { padding: 14px 16px 40px; font-size: 13.5px; line-height: 1.6; color: var(--text-primary); }
  #panel-body h1, #panel-body h2, #panel-body h3 { font-size: 14px; margin: 18px 0 6px; color: var(--text-primary); }
  #panel-body p { margin: 0 0 12px; }
  #panel-body ul { margin: 0 0 12px; padding-left: 20px; }
  #panel-body blockquote {
    margin: 0 0 12px; padding-left: 12px; border-left: 2px solid var(--border); color: var(--text-secondary);
  }
  #panel-body a { color: var(--layer-mycelium); }
  #panel-body code { background: var(--surface-2); padding: 1px 5px; border-radius: 4px; font-size: 12px; }
  #panel-body hr { border: none; border-top: 1px solid var(--gridline); margin: 16px 0; }
  #panel-footer { padding: 0 16px 16px; }
  #panel-footer a { color: var(--text-muted); font-size: 11px; }
  #panel-loading, #panel-error { padding: 16px; color: var(--text-muted); font-size: 12.5px; }

  #empty-state {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); font-size: 13px; text-align: center; padding: 20px;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Brain Tree <span>— a living library of one mind</span></h1>
    <input id="search" type="text" placeholder="Search nodes…" autocomplete="off">
    <div id="legend"></div>
    <div id="meta-info"></div>
  </header>
  <main>
    <div id="graph-wrap">
      <svg id="graph"></svg>
      <div id="tooltip"></div>
      <div id="empty-state" style="display:none">Loading graph…</div>
    </div>
    <div id="panel">
      <div id="panel-header">
        <button id="panel-close" aria-label="Close">×</button>
        <h2 id="panel-title"></h2>
        <div id="panel-badges"></div>
      </div>
      <div id="panel-body"></div>
      <div id="panel-footer"><a id="panel-source" href="#" target="_blank" rel="noopener">View raw source on GitHub →</a></div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
(function () {
  "use strict";

  const REPO = "jjm1984/brain-tree";
  const BRANCH = "main";
  const RAW_BASE = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/`;
  const BLOB_BASE = `https://github.com/${REPO}/blob/${BRANCH}/`;

  const LAYER_COLOR_VAR = {
    mycelium: "--layer-mycelium",
    roots: "--layer-roots",
    knowledge: "--layer-knowledge",
    code: "--layer-code",
    map: "--layer-map",
    "flowers-fruits": "--layer-flowers-fruits",
    meta: "--layer-meta"
  };
  const LAYER_ORDER = ["mycelium", "roots", "knowledge", "code", "map", "flowers-fruits", "meta"];
  const LAYER_LABEL = {
    mycelium: "Mycelium", roots: "Roots", knowledge: "Knowledge",
    code: "Code", map: "Map", "flowers-fruits": "Flowers & Fruits", meta: "Meta"
  };
  const STATE_EMOJI = {
    green: "🟢", yellow: "🟡", dry: "🍂", peripheral: "⬜",
    forming: "🌱", growing: "🌿", grounded: "🪨", "in-tension": "🌀"
  };
  const TYPE_RADIUS = { layer: 10, branch: 8, philosophy: 8, principle: 7, inference: 5, "feedback-entry": 5, leaf: 5 };

  function cssVar(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }
  function layerColor(layer) {
    const v = LAYER_COLOR_VAR[layer];
    return v ? cssVar(v) : cssVar("--layer-unknown");
  }
  function stateEmoji(state) {
    if (!state || typeof state !== "object") return "";
    const val = Object.values(state)[0];
    return STATE_EMOJI[val] || "";
  }

  const svg = d3.select("#graph");
  const tooltip = document.getElementById("tooltip");
  const graphWrap = document.getElementById("graph-wrap");
  const emptyState = document.getElementById("empty-state");
  const panel = document.getElementById("panel");

  let simulation, linkSel, nodeSel, allNodes = [], allLinks = [];

  function dimensions() {
    return [graphWrap.clientWidth, graphWrap.clientHeight];
  }

  const gRoot = svg.append("g");
  const gLinks = gRoot.append("g").attr("class", "links");
  const gNodes = gRoot.append("g").attr("class", "nodes");

  const zoomBehavior = d3.zoom().scaleExtent([0.15, 4]).on("zoom", (ev) => {
    gRoot.attr("transform", ev.transform);
  });
  svg.call(zoomBehavior);

  function fitToView() {
    if (!allNodes.length) return;
    const [width, height] = dimensions();
    const pad = 60;
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    allNodes.forEach(d => {
      if (typeof d.x !== "number") return;
      minX = Math.min(minX, d.x); maxX = Math.max(maxX, d.x);
      minY = Math.min(minY, d.y); maxY = Math.max(maxY, d.y);
    });
    if (!isFinite(minX)) return;
    const bboxW = Math.max(maxX - minX, 1), bboxH = Math.max(maxY - minY, 1);
    const scale = Math.min(4, Math.max(0.15, Math.min((width - pad * 2) / bboxW, (height - pad * 2) / bboxH)));
    const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
    const transform = d3.zoomIdentity.translate(width / 2, height / 2).scale(scale).translate(-cx, -cy);
    svg.transition().duration(500).call(zoomBehavior.transform, transform);
  }

  function render(graph) {
    emptyState.style.display = "none";
    const [width, height] = dimensions();

    allNodes = graph.nodes.map(d => Object.assign({}, d));
    const idSet = new Set(allNodes.map(n => n.id));
    allLinks = graph.edges.filter(e => idSet.has(e.source) && idSet.has(e.target)).map(d => Object.assign({}, d));

    document.getElementById("meta-info").textContent =
      `${graph.meta.nodeCount} nodes · ${graph.meta.edgeCount} edges`;

    buildLegend();

    simulation = d3.forceSimulation(allNodes)
      .force("link", d3.forceLink(allLinks).id(d => d.id).distance(70).strength(0.35))
      .force("charge", d3.forceManyBody().strength(-140))
      .force("x", d3.forceX(width / 2).strength(0.045))
      .force("y", d3.forceY(height / 2).strength(0.045))
      .force("collision", d3.forceCollide().radius(d => (TYPE_RADIUS[d.type] || 5) + 14));

    linkSel = gLinks.selectAll("line").data(allLinks).join("line")
      .attr("class", "link")
      .attr("stroke-width", 1);

    nodeSel = gNodes.selectAll("g.node").data(allNodes, d => d.id).join(enter => {
      const g = enter.append("g").attr("class", "node");
      g.append("circle")
        .attr("r", d => TYPE_RADIUS[d.type] || 5)
        .attr("fill", d => layerColor(d.layer));
      g.append("text")
        .attr("dy", d => (TYPE_RADIUS[d.type] || 5) + 10)
        .attr("text-anchor", "middle")
        .text(d => d.title);
      return g;
    });

    nodeSel
      .on("mouseenter", (ev, d) => showTooltip(ev, d))
      .on("mousemove", (ev) => positionTooltip(ev))
      .on("mouseleave", hideTooltip)
      .on("click", (ev, d) => openPanel(d))
      .call(d3.drag()
        .on("start", (ev, d) => { if (!ev.active) simulation.alphaTarget(0.2).restart(); d.fx = d.x; d.fy = d.y; })
        .on("drag", (ev, d) => { d.fx = ev.x; d.fy = ev.y; })
        .on("end", (ev, d) => { if (!ev.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }));

    simulation.on("tick", () => {
      linkSel
        .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
      nodeSel.attr("transform", d => `translate(${d.x},${d.y})`);
    });
    simulation.on("end", fitToView);
    // Simulation can take a couple seconds to reach "end" (alpha below threshold);
    // also fit once shortly after start so the graph isn't stranded off-screen meanwhile.
    setTimeout(fitToView, 800);
  }

  function buildLegend() {
    const legend = document.getElementById("legend");
    legend.innerHTML = "";
    const active = new Set(LAYER_ORDER);
    LAYER_ORDER.forEach(layer => {
      const item = document.createElement("div");
      item.className = "item";
      item.dataset.layer = layer;
      item.innerHTML = `<span class="dot" style="background:${layerColor(layer)}"></span>${LAYER_LABEL[layer]}`;
      item.addEventListener("click", () => {
        if (active.has(layer)) active.delete(layer); else active.add(layer);
        item.classList.toggle("dim", !active.has(layer));
        applyLayerFilter(active);
      });
      legend.appendChild(item);
    });
  }

  function applyLayerFilter(active) {
    nodeSel.classed("faded", d => !active.has(d.layer));
    linkSel.classed("faded", d => !active.has(d.source.layer) || !active.has(d.target.layer));
  }

  function showTooltip(ev, d) {
    tooltip.innerHTML = `<div class="t-title">${stateEmoji(d.state)} ${escapeHtml(d.title)}</div>
      <div class="t-meta">${LAYER_LABEL[d.layer] || d.layer} · ${d.type}${d.instrument ? " · " + d.instrument : ""}</div>`;
    tooltip.style.display = "block";
    positionTooltip(ev);
  }
  function positionTooltip(ev) {
    const rect = graphWrap.getBoundingClientRect();
    tooltip.style.left = (ev.clientX - rect.left + 14) + "px";
    tooltip.style.top = (ev.clientY - rect.top + 14) + "px";
  }
  function hideTooltip() { tooltip.style.display = "none"; }

  function escapeHtml(s) {
    return String(s || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  // --- Minimal markdown renderer for the subset this repo actually uses ---
  function renderMarkdown(md) {
    const lines = md.split("\n");
    let html = "", inList = false, inQuote = false;
    function closeList() { if (inList) { html += "</ul>"; inList = false; } }
    function closeQuote() { if (inQuote) { html += "</blockquote>"; inQuote = false; } }
    function inline(t) {
      t = escapeHtml(t);
      t = t.replace(/\[\[([^\]]+)\]\]/g, '<code>[[$1]]</code>');
      t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
      t = t.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
      t = t.replace(/`([^`]+)`/g, "<code>$1</code>");
      t = t.replace(/(^|[^*])\*([^*]+)\*/g, "$1<em>$2</em>");
      return t;
    }
    for (const raw of lines) {
      const line = raw.replace(/\r$/, "");
      if (/^\s*$/.test(line)) { closeList(); closeQuote(); continue; }
      if (/^---+$/.test(line.trim())) { closeList(); closeQuote(); html += "<hr>"; continue; }
      let m;
      if ((m = line.match(/^(#{1,6})\s+(.*)$/))) {
        closeList(); closeQuote();
        const level = Math.min(m[1].length + 1, 4);
        html += `<h${level}>${inline(m[2])}</h${level}>`;
        continue;
      }
      if ((m = line.match(/^>\s?(.*)$/))) {
        if (!inQuote) { html += "<blockquote>"; inQuote = true; }
        html += `<p>${inline(m[1])}</p>`;
        continue;
      }
      closeQuote();
      if ((m = line.match(/^[-*]\s+(.*)$/))) {
        if (!inList) { html += "<ul>"; inList = true; }
        html += `<li>${inline(m[1])}</li>`;
        continue;
      }
      closeList();
      html += `<p>${inline(line)}</p>`;
    }
    closeList(); closeQuote();
    return html;
  }

  function stripFrontmatter(text) {
    const m = text.match(/^---\r?\n[\s\S]*?\r?\n---\r?\n?/);
    return m ? text.slice(m[0].length) : text;
  }

  function openPanel(d) {
    panel.classList.add("open");
    document.getElementById("panel-title").textContent = `${stateEmoji(d.state)} ${d.title}`;
    document.getElementById("panel-badges").innerHTML =
      `<span>${LAYER_LABEL[d.layer] || d.layer}</span><span>${d.type}</span>` +
      (d.instrument ? `<span>${d.instrument}</span>` : "");
    const body = document.getElementById("panel-body");
    body.innerHTML = '<div id="panel-loading">Loading source…</div>';
    const src = document.getElementById("panel-source");
    src.href = BLOB_BASE + d.filePath;

    if (!d.filePath) {
      body.innerHTML = '<div id="panel-error">No source file recorded for this node.</div>';
      return;
    }
    fetch(RAW_BASE + d.filePath)
      .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
      .then(text => { body.innerHTML = renderMarkdown(stripFrontmatter(text)); })
      .catch(() => {
        body.innerHTML = '<div id="panel-error">Could not load source from GitHub. ' +
          'If this repo isn\'t pushed/public yet, raw file fetches will fail until it is. ' +
          '<br><br>Path: <code>' + escapeHtml(d.filePath) + "</code></div>";
      });
  }

  document.getElementById("panel-close").addEventListener("click", () => panel.classList.remove("open"));

  document.getElementById("search").addEventListener("input", (ev) => {
    const q = ev.target.value.trim().toLowerCase();
    if (!nodeSel) return;
    if (!q) { nodeSel.classed("faded", false); linkSel.classed("faded", false); return; }
    const matchIds = new Set(allNodes.filter(n => (n.title || "").toLowerCase().includes(q) || (n.id || "").toLowerCase().includes(q)).map(n => n.id));
    nodeSel.classed("faded", d => !matchIds.has(d.id));
    linkSel.classed("faded", d => !matchIds.has(d.source.id) && !matchIds.has(d.target.id));
  });

  window.addEventListener("resize", () => {
    if (!simulation) return;
    const [width, height] = dimensions();
    simulation.force("center", d3.forceCenter(width / 2, height / 2));
    simulation.alpha(0.3).restart();
  });

  emptyState.style.display = "flex";
  fetch("public/graph.json")
    .then(r => r.json())
    .then(render)
    .catch(err => {
      emptyState.textContent = "Could not load public/graph.json — run `npm run build` first.";
      console.error(err);
    });
})();
</script>
</body>
</html>
